name: deploy-space

on:
  push:
    branches: [main]
    paths:
      - "apps/hatefulmemes-space/**"
      - "src/awake/viz/**"
      - "src/awake/eval/modality_shapley.py"
      - "src/awake/eval/text_occlusion.py"
      - ".github/workflows/deploy-space.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'Desmond-Mariita/interpretability-foundations'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Assemble the Space in a scratch dir with awake vendored in — never commit
      # _vendored onto main. The vendored awake/eval/__init__.py is intentionally
      # EMPTY so importing awake.eval.modality_shapley does not drag the rest of the
      # eval package (which is not vendored).
      - name: Assemble Space subtree (vendor modality_shapley + text_occlusion + viz)
        run: |
          rm -rf _space
          mkdir -p _space
          cp -r apps/hatefulmemes-space/. _space/
          rm -rf _space/_vendored
          mkdir -p _space/_vendored/awake/eval _space/_vendored/awake/viz
          cp src/awake/eval/modality_shapley.py _space/_vendored/awake/eval/
          cp src/awake/eval/text_occlusion.py   _space/_vendored/awake/eval/
          cp -r src/awake/viz/. _space/_vendored/awake/viz/
          touch _space/_vendored/awake/__init__.py
          touch _space/_vendored/awake/eval/__init__.py

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USER: ${{ secrets.HF_USER }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
        run: |
          if [ -z "$HF_TOKEN" ]; then
            echo "::warning::HF_TOKEN is unset; skipping deploy. Configure repository secrets to enable."
            exit 0
          fi
          cd _space
          git init -q
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add -A
          git commit -q -m "space build"
          git push --force "https://${HF_USER}:${HF_TOKEN}@huggingface.co/spaces/${HF_USER}/${HF_SPACE}" HEAD:main
